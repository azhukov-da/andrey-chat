services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: andreychat
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  be:
    build:
      context: ./BE
      dockerfile: Web/Dockerfile
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=andreychat;Username=postgres;Password=postgres
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - Cors__AllowedOrigins__0=http://localhost
    volumes:
      - uploads_data:/var/app/uploads
    depends_on:
      db:
        condition: service_healthy

  fe:
    build:
      context: ./FE
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - be

volumes:
  postgres_data:
  uploads_data:
